# UWAGA: ten plik należy do repo nexciq/craftium-releases (publiczne, darmowe Actions),
# jako .github/workflows/mod-validate.yml. Kopia referencyjna w prywatnym craftium.
#
# Buduje multi-wersyjny mod (Stonecutter) dla WSZYSTKICH skonfigurowanych wersji
# naraz (chiseledBuild), by sprawdzić, czy kompilują się, ZANIM dopniemy je do
# wydań. Nic nie publikuje — tylko artefakty jarów do pobrania/inspekcji.
# Wymaga sekretu SOURCE_TOKEN (Contents: Read na craftium).

name: Validate mod versions

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Gałąź/tag w repo źródłowym (nexciq/craftium)'
        default: claude/minecraft-launcher-build-52gbha

jobs:
  stonecutter:
    name: Stonecutter (wszystkie wersje)
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz prywatne źródło
        uses: actions/checkout@v4
        with:
          repository: nexciq/craftium
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: chiseledBuild (wszystkie wersje)
        working-directory: cosmetics-mod-mv
        run: |
          gradle chiseledBuild --no-daemon --stacktrace
          echo "== JARY w całym workspace po chiseledBuild =="
          find "$GITHUB_WORKSPACE" -name '*.jar' 2>/dev/null | grep -i cosmetics | sort || true

      - name: Zbierz jary per wersja
        working-directory: cosmetics-mod-mv
        run: |
          mkdir -p staged
          echo "== INWENTARZ wszystkich jarów craftium-cosmetics =="
          find . -name 'craftium-cosmetics*.jar' | sort || true
          # Jar nazywa się craftium-cosmetics-<mcVersion>.jar (version=mcVersion),
          # więc kopiujemy po nazwie bazowej z dowolnego build/libs.
          find "$GITHUB_WORKSPACE" -path '*build/libs*' -name 'craftium-cosmetics-*.jar' \
               ! -name '*-sources.jar' ! -name '*-dev.jar' -exec cp -n {} staged/ \;
          echo "== staged =="; ls -la staged
          [ -n "$(ls -A staged 2>/dev/null)" ] || { echo "!! BRAK jarów — patrz inwentarz wyżej"; exit 1; }

      - name: Upload jary (do inspekcji)
        uses: actions/upload-artifact@v4
        with:
          name: stonecutter-jars
          path: cosmetics-mod-mv/staged/*.jar
          if-no-files-found: error

  # Minecraft 26.1.x: oficjalne mapowania Mojang, Loom 1.17-SNAPSHOT, Gradle current, Java 25.
  # Osobny job (inny toolchain). Cała rodzina dropu 1 (26.1, 26.1.1, 26.1.2) dzieli to
  # samo API renderu (MultiBufferSource + RenderTypes). 26.2 NIE tu — przebudowało
  # cały system renderu encji (SubmitNodeCollector zamiast MultiBufferSource), więc
  # wymaga osobnego miksina (patrz cosmetics-mod-262 / docs/cosmetics-versions.md).
  mc26:
    name: Mod ${{ matrix.mc }} (Mojang mappings)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: '26.1.1'
            depend: '>=26.1 <26.2'
            java: '25'
          - mc: '26.1.2'
            depend: '>=26.1 <26.2'
            java: '25'
    steps:
      - name: Pobierz prywatne źródło
        uses: actions/checkout@v4
        with:
          repository: nexciq/craftium
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          # Najnowszy stabilny Gradle (wymagany przez Loom 1.17-SNAPSHOT dla 26.x).
          gradle-version: 'current'

      - name: Build ${{ matrix.mc }}
        working-directory: cosmetics-mod-26
        run: >
          gradle build --no-daemon --stacktrace
          -Pminecraft_version=${{ matrix.mc }}
          -Pjava_version=${{ matrix.java }}
          "-Pmc_depend=${{ matrix.depend }}"

      - name: Zbierz jar
        run: |
          mkdir -p staged26
          jar=$(ls cosmetics-mod-26/build/libs/craftium-cosmetics-*.jar 2>/dev/null | grep -v sources | head -1)
          if [ -n "$jar" ]; then
            cp "$jar" "staged26/craftium-cosmetics-${{ matrix.mc }}.jar"
            echo "OK ${{ matrix.mc }} -> $jar"
          else
            echo "BRAK jara ${{ matrix.mc }}"
          fi
          ls -la staged26 || true

      - name: Upload jar ${{ matrix.mc }}
        uses: actions/upload-artifact@v4
        with:
          name: mc26-jar-${{ matrix.mc }}
          path: staged26/*.jar
          if-no-files-found: error

  # Minecraft 26.2: PRZEBUDOWANY render encji (deferred submit). Osobne źródło
  # cosmetics-mod-262 z innym miksinem (OrderedRenderCommandQueue/CameraRenderState).
  # Best-effort — iterujemy nazwy/sygnatury przez ten job. Może być czerwony,
  # nie blokuje rodziny 26.1.x (osobny job).
  mc262:
    name: Mod 26.2 (deferred submit, best-effort)
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz prywatne źródło
        uses: actions/checkout@v4
        with:
          repository: nexciq/craftium
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 'current'

      - name: Build 26.2
        working-directory: cosmetics-mod-262
        run: gradle build --no-daemon --stacktrace -Pminecraft_version=26.2

      - name: Zbierz jar
        run: |
          mkdir -p staged262
          jar=$(ls cosmetics-mod-262/build/libs/craftium-cosmetics-*.jar 2>/dev/null | grep -v sources | head -1)
          if [ -n "$jar" ]; then
            cp "$jar" "staged262/craftium-cosmetics-26.2.jar"
            echo "OK 26.2 -> $jar"
          else
            echo "BRAK jara 26.2"
          fi
          ls -la staged262 || true

      - name: Upload jar 26.2
        uses: actions/upload-artifact@v4
        with:
          name: mc262-jar
          path: staged262/*.jar
          if-no-files-found: warn

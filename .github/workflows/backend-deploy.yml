# UWAGA: ten plik należy do repo nexciq/craftium-releases (publiczne, darmowe Actions),
# jako .github/workflows/backend-deploy.yml. Tutaj (w prywatnym craftium) leży tylko
# kopia referencyjna — NIE w .github/workflows/, by nie odpalał się w płatnym repo.
#
# Wymagane sekrety w repo craftium-releases:
#   SOURCE_TOKEN          – fine-grained PAT, Contents: Read na nexciq/craftium
#   CLOUDFLARE_API_TOKEN  – token API Cloudflare (Workers + D1 edit)
#   CLOUDFLARE_ACCOUNT_ID – ID konta Cloudflare

name: Backend Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Gałąź/tag w repo źródłowym (nexciq/craftium)'
        default: claude/minecraft-launcher-build-52gbha

jobs:
  deploy:
    name: Deploy Worker + migracja D1
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Pobierz prywatne źródło
        uses: actions/checkout@v4
        with:
          repository: nexciq/craftium
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migration (idempotentne)
        run: npx wrangler d1 execute craftium --remote --file=migrations/0001_init.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

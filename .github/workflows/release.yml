# UWAGA: ten plik należy do repo nexciq/craftium-releases (publiczne, darmowe Actions),
# jako .github/workflows/release.yml. Tutaj (w prywatnym craftium) leży tylko kopia
# referencyjna — NIE w .github/workflows/, żeby nie uruchamiał się w płatnym repo.
#
# Wymaga sekretu SOURCE_TOKEN (fine-grained PAT, Contents: Read na nexciq/craftium).
# Publikacja idzie do tego samego repo (craftium-releases) wbudowanym GITHUB_TOKEN.

name: Build & Release (Windows)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Gałąź/tag w repo źródłowym (nexciq/craftium)'
        default: claude/minecraft-launcher-build-52gbha

jobs:
  # Mod kosmetyków (Fabric) — JEDNO źródło multi-wersyjne (Stonecutter).
  # `chiseledBuild` buduje craftium-cosmetics-<wersja MC>.jar dla wszystkich
  # wersji skonfigurowanych w cosmetics-mod-mv/settings.gradle.kts naraz.
  # Dodanie wersji = wpis w `versions(...)` tam (+ ew. guard //?), nie tutaj.
  # Zwalidowane wcześniej przez workflow „Validate mod versions".
  mod:
    name: Mod kosmetyków (Stonecutter — wszystkie wersje)
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz prywatne źródło
        uses: actions/checkout@v4
        with:
          repository: nexciq/craftium
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: chiseledBuild (wszystkie wersje)
        working-directory: cosmetics-mod-mv
        run: gradle chiseledBuild --no-daemon --stacktrace

      - name: Zbierz jary per wersja
        working-directory: cosmetics-mod-mv
        run: |
          mkdir -p staged
          find . -path '*/build/libs/*.jar' -name 'craftium-cosmetics-*.jar' ! -name '*-sources.jar' |
          while read -r jar; do
            ver=$(printf '%s' "$jar" | sed -n 's#.*/versions/\([^/]*\)/.*#\1#p')
            [ -z "$ver" ] && ver=$(basename "$jar" .jar)
            cp "$jar" "staged/craftium-cosmetics-${ver}.jar"
            echo "OK ${ver} <- ${jar}"
          done
          echo "== staged =="; ls -la staged

      - name: Upload jary moda
        uses: actions/upload-artifact@v4
        with:
          name: cosmetics-mod-jars
          path: cosmetics-mod-mv/staged/*.jar
          if-no-files-found: error

  package:
    name: Instalator Windows
    needs: mod
    runs-on: windows-latest
    permissions:
      contents: write # GITHUB_TOKEN tworzy/aktualizuje Release w craftium-releases

    steps:
      - name: Pobierz prywatne źródło
        uses: actions/checkout@v4
        with:
          repository: nexciq/craftium
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Wbuduj mody kosmetyków (per wersja MC) — launcher wybiera pasujący jar.
      - name: Pobierz jary moda (wszystkie wersje)
        uses: actions/download-artifact@v4
        with:
          name: cosmetics-mod-jars
          path: resources/mods

      # Kopia pod generyczną nazwą — fallback dla 1.21.1 (zgodność wsteczna).
      - name: Generyczny jar (fallback 1.21.1)
        shell: bash
        run: cp resources/mods/craftium-cosmetics-1.21.1.jar resources/mods/craftium-cosmetics.jar

      - name: Build (renderer/main/preload)
        run: npm run build

      # Publikacja idzie do repo, w którym działa workflow (craftium-releases),
      # więc wystarczy wbudowany GITHUB_TOKEN — bez PAT-a do zapisu.
      - name: Package & publish (Windows)
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# UWAGA: ten plik należy do repo nexciq/craftium-releases (publiczne, darmowe Actions),
# jako .github/workflows/release.yml. Tutaj (w prywatnym craftium) leży tylko kopia
# referencyjna — NIE w .github/workflows/, żeby nie uruchamiał się w płatnym repo.
#
# Wymaga sekretu SOURCE_TOKEN (fine-grained PAT, Contents: Read na nexciq/craftium).
# Publikacja idzie do tego samego repo (craftium-releases) wbudowanym GITHUB_TOKEN.

name: Build & Release (Windows)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Gałąź/tag w repo źródłowym (nexciq/craftium)'
        default: claude/minecraft-launcher-build-52gbha

jobs:
  # Mod kosmetyków (Fabric) — JEDNO źródło multi-wersyjne (Stonecutter).
  # `chiseledBuild` buduje craftium-cosmetics-<wersja MC>.jar dla wszystkich
  # wersji skonfigurowanych w cosmetics-mod-mv/settings.gradle.kts naraz.
  # Dodanie wersji = wpis w `versions(...)` tam (+ ew. guard //?), nie tutaj.
  # Zwalidowane wcześniej przez workflow „Validate mod versions".
  mod:
    name: Mod kosmetyków (Stonecutter — wszystkie wersje)
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz prywatne źródło
        uses: actions/checkout@v4
        with:
          repository: nexciq/craftium
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: chiseledBuild + zbierz jary
        working-directory: cosmetics-mod-mv
        run: |
          echo "===== chiseledBuild ====="
          gradle chiseledBuild --no-daemon --stacktrace --console=plain --rerun-tasks
          echo "===== katalogi libs ====="
          find "$GITHUB_WORKSPACE/cosmetics-mod-mv" -type d -name libs 2>/dev/null || true
          echo "===== jary cosmetics w workspace ====="
          find "$GITHUB_WORKSPACE" -name '*.jar' 2>/dev/null | grep -i cosmetics | sort || true
          mkdir -p staged
          find "$GITHUB_WORKSPACE" -path '*build/libs*' -name 'craftium-cosmetics-*.jar' \
               ! -name '*-sources.jar' ! -name '*-dev.jar' -exec cp -n {} staged/ \;
          echo "===== staged ====="; ls -la staged
          [ -n "$(ls -A staged 2>/dev/null)" ] || { echo "!! BRAK jarów — patrz log wyżej"; exit 1; }

      - name: Upload jary moda
        uses: actions/upload-artifact@v4
        with:
          name: cosmetics-mod-jars
          path: cosmetics-mod-mv/staged/*.jar
          if-no-files-found: error

  # Mod 1.21.2–1.21.8 (yarn, era „render-state") — osobny Stonecutter (Loom 1.9).
  modd1:
    name: Mod kosmetyków (Stonecutter D1 — 1.21.2–1.21.8)
    runs-on: ubuntu-latest
    # Best-effort: czerwony D1 NIE blokuje wydania (brak jara = brak odznaki dla tych
    # wersji, launcher degraduje się łagodnie). Walidacja w „Validate mod versions".
    continue-on-error: true
    steps:
      - name: Pobierz prywatne źródło
        uses: actions/checkout@v4
        with:
          repository: nexciq/craftium
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4
        with:
          # Loom 1.11-SNAPSHOT (jak D2) — Gradle current (9.x).
          gradle-version: 'current'

      - name: chiseledBuild + zbierz jary
        working-directory: cosmetics-mod-d1
        run: |
          gradle chiseledBuild --no-daemon --stacktrace --console=plain --rerun-tasks
          mkdir -p staged
          find "$GITHUB_WORKSPACE/cosmetics-mod-d1" -path '*build/libs*' -name 'craftium-cosmetics-*.jar' \
               ! -name '*-sources.jar' ! -name '*-dev.jar' -exec cp -n {} staged/ \;
          echo "===== staged ====="; ls -la staged
          [ -n "$(ls -A staged 2>/dev/null)" ] || { echo "!! BRAK jarów D1"; exit 1; }

      - name: Upload jary moda D1
        uses: actions/upload-artifact@v4
        with:
          name: cosmetics-mod-jars-d1
          path: cosmetics-mod-d1/staged/*.jar
          if-no-files-found: error

  # Mod 1.21.9–1.21.11 (yarn, era „deferred submit") — osobny Stonecutter (Loom 1.11).
  modd2:
    name: Mod kosmetyków (Stonecutter D2 — 1.21.9–1.21.11)
    runs-on: ubuntu-latest
    # Best-effort: czerwony D2 NIE blokuje wydania (jw.).
    continue-on-error: true
    steps:
      - name: Pobierz prywatne źródło
        uses: actions/checkout@v4
        with:
          repository: nexciq/craftium
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 'current'

      - name: chiseledBuild + zbierz jary
        working-directory: cosmetics-mod-d2
        run: |
          gradle chiseledBuild --no-daemon --stacktrace --console=plain --rerun-tasks
          mkdir -p staged
          find "$GITHUB_WORKSPACE/cosmetics-mod-d2" -path '*build/libs*' -name 'craftium-cosmetics-*.jar' \
               ! -name '*-sources.jar' ! -name '*-dev.jar' -exec cp -n {} staged/ \;
          echo "===== staged ====="; ls -la staged
          [ -n "$(ls -A staged 2>/dev/null)" ] || { echo "!! BRAK jarów D2"; exit 1; }

      - name: Upload jary moda D2
        uses: actions/upload-artifact@v4
        with:
          name: cosmetics-mod-jars-d2
          path: cosmetics-mod-d2/staged/*.jar
          if-no-files-found: error

  # Mod 26.1.x — oddzielny toolchain (mapowania Mojang, Java 25, Gradle current).
  mod26:
    name: Mod kosmetyków ${{ matrix.mc }} (Mojang)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: '26.1'
            depend: '>=26.1 <26.2'
          - mc: '26.1.1'
            depend: '>=26.1 <26.2'
          - mc: '26.1.2'
            depend: '>=26.1 <26.2'
    steps:
      - name: Pobierz prywatne źródło
        uses: actions/checkout@v4
        with:
          repository: nexciq/craftium
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 'current'

      - name: Build ${{ matrix.mc }}
        working-directory: cosmetics-mod-26
        run: >
          gradle build --no-daemon --stacktrace
          -Pminecraft_version=${{ matrix.mc }}
          -Pjava_version=25
          "-Pmc_depend=${{ matrix.depend }}"

      - name: Zbierz jar
        run: |
          mkdir -p staged26
          jar=$(ls cosmetics-mod-26/build/libs/craftium-cosmetics-*.jar 2>/dev/null | grep -v sources | head -1)
          cp "$jar" "staged26/craftium-cosmetics-${{ matrix.mc }}.jar"

      - name: Upload jar ${{ matrix.mc }}
        uses: actions/upload-artifact@v4
        with:
          name: cosmetics-mod-jars-26-${{ matrix.mc }}
          path: staged26/*.jar
          if-no-files-found: error

  # Mod 26.2 — oddzielne źródło (przebudowany render: deferred submit).
  mod262:
    name: Mod kosmetyków 26.2 (Mojang, deferred submit)
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz prywatne źródło
        uses: actions/checkout@v4
        with:
          repository: nexciq/craftium
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 'current'

      - name: Build 26.2
        working-directory: cosmetics-mod-262
        run: gradle build --no-daemon --stacktrace -Pminecraft_version=26.2

      - name: Zbierz jar
        run: |
          mkdir -p staged262
          jar=$(ls cosmetics-mod-262/build/libs/craftium-cosmetics-*.jar 2>/dev/null | grep -v sources | head -1)
          cp "$jar" "staged262/craftium-cosmetics-26.2.jar"

      - name: Upload jar 26.2
        uses: actions/upload-artifact@v4
        with:
          name: cosmetics-mod-jars-262
          path: staged262/*.jar
          if-no-files-found: error

  package:
    name: Instalator Windows
    needs: [mod, modd1, modd2, mod26, mod262]
    runs-on: windows-latest
    permissions:
      contents: write # GITHUB_TOKEN tworzy/aktualizuje Release w craftium-releases

    steps:
      - name: Pobierz prywatne źródło
        uses: actions/checkout@v4
        with:
          repository: nexciq/craftium
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Wbuduj mody kosmetyków (per wersja MC) — launcher wybiera pasujący jar.
      # Pobiera wszystkie artefakty: Stonecutter (1.18.2–1.21.1) + 26.1.x + 26.2.
      - name: Pobierz jary moda (wszystkie wersje)
        uses: actions/download-artifact@v4
        with:
          pattern: cosmetics-mod-jars*
          path: resources/mods
          merge-multiple: true

      # Kopia pod generyczną nazwą — fallback dla 1.21.1 (zgodność wsteczna).
      - name: Generyczny jar (fallback 1.21.1)
        shell: bash
        run: cp resources/mods/craftium-cosmetics-1.21.1.jar resources/mods/craftium-cosmetics.jar

      - name: Build (renderer/main/preload)
        run: npm run build

      # Publikacja idzie do repo, w którym działa workflow (craftium-releases),
      # więc wystarczy wbudowany GITHUB_TOKEN — bez PAT-a do zapisu.
      - name: Package & publish (Windows)
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
